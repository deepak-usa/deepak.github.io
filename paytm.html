        /* Main Container */
        .main-wrapper {

            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }

        /* Link Styling */
        .game-links a {
            display: block;
            margin: 10px auto;
            color: #00d4ff;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .game-links a:hover {
            text-decoration: underline;
            color: #fff;
        }

        /* UPI/Payment Buttons */
        .btn-payment {
            display: inline-block;
            padding: 12px 24px;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin: 8px;
            transition: transform 0.2s;
        }

        .btn-payment:hover {
            transform: scale(1.05);
        }

        /* Specific Colors */
        .gpay { background: #4285F4; }
        .bhim { background: #e37222; }
        .airtel { background: #e11900; }
        .payu { background: #61ba26; }
        .paypal { background: #003087; }

        /* QR Section */
        .qr-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,255,255,0.3);
        }

        .qr-section h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .qr-section img {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            max-width: 100%;
            height: auto;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .name { font-size: 1.5em; }
            .btn-payment { display: block; margin: 10px 0; }
        }
